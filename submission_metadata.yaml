ai_usage_summary: |
  Used the Antigravity agent to design and implement the system.
  No candidate data was fed to any LLM. Local semantic search was used.

methodology_summary: |
  Explicitly-weighted hybrid ranker with a 2-pass pipeline:
  1. Semantic Match (35%): BAAI/bge-small-en-v1.5 cosine similarity between JD and candidate summary/experience.
  2. Career Relevance (25%): Extraction of vector DBs, ML keywords from experience (not just skills), with penalization for pure consulting or research backgrounds.
  3. Behavioral Signals (20%): Recruiter response rate, GitHub activity, and interview completion rate.
  4. Recency (10%): Exponential decay based on last active date.
  5. Honeypot Penalty (10%): Proportional multiplier for ghosting risk and resume padding.
  Runtime is ~1 min for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
